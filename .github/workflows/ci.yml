name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint and package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Byte-compile sources
        run: python -m compileall -q src

      - name: Package application
        run: zip -r nao-ball-pickup.zip src docs LICENSE README.md

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: nao-ball-pickup
          path: nao-ball-pickup.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: nao-ball-pickup

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: nao-ball-pickup.zip
          body: |
            Initial archived release (${{ github.ref_name }}) of NAO Ball Pickup, an academic project preserved for reference. See the README for documentation.

            **Full Changelog**: https://github.com/mtorun0x7cd/nao-ball-pickup/commits/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
