<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <!-- Filter for glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="var(--accent-robot)" flood-opacity="var(--glow-opacity)"/>
        </filter>
    </defs>

    <style>
        :root {
            --text-title: #0f172a;
            --text-subtitle: #475569;
            --text-badge: #475569;
            --accent-robot: #1f70b0;
            --accent-ball: #d81159;
            --badge-border: #cbd5e1;
            --glow-opacity: 0.05;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text-title: #ffffff;
                --text-subtitle: #a0aec0;
                --text-badge: #718096;
                --accent-robot: #3776AB;
                --accent-ball: #ff4785;
                --badge-border: #2C3E50;
                --glow-opacity: 0.25;
            }
        }
        .bg-border {
            stroke: var(--accent-robot);
            stroke-opacity: 0.15;
        }
        .robot-stroke {
            stroke: var(--accent-robot);
        }
        .robot-fill {
            fill: var(--accent-robot);
        }
        .ball-stroke {
            stroke: var(--accent-ball);
        }
        .ball-fill {
            fill: var(--accent-ball);
        }
        .text-title {
            fill: var(--text-title);
        }
        .text-subtitle {
            fill: var(--text-subtitle);
        }
        .text-badge-dev {
            fill: var(--text-title);
        }
        .text-badge-gh {
            fill: var(--text-badge);
        }
        .badge-rect-dev {
            fill: var(--accent-robot);
            fill-opacity: 0.12;
            stroke: var(--accent-robot);
            stroke-opacity: 0.3;
        }
        .badge-rect-gh {
            stroke: var(--badge-border);
        }
        .divider {
            stroke: var(--accent-robot);
        }
    </style>

    <!-- Outer border/frame -->
    <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" class="bg-border" stroke-width="2"/>

    <!-- Centered Visual Icon group -->
    <g transform="translate(340, -50)" filter="url(#glow)">
        <!-- Humanoid robot head profile -->
        <circle cx="180" cy="280" r="60" fill="none" class="robot-stroke" stroke-width="8"/>
        <path d="M 180 220 L 140 170 M 180 220 L 220 170" fill="none" class="robot-stroke" stroke-width="6" stroke-linecap="round"/>
        <circle cx="140" cy="170" r="10" class="robot-fill"/>
        <circle cx="220" cy="170" r="10" class="robot-fill"/>
        
        <!-- Glowing ball and target viewport crosshair -->
        <circle cx="340" cy="320" r="40" fill="none" class="ball-stroke" stroke-width="8"/>
        <circle cx="340" cy="320" r="15" class="ball-fill"/>
        
        <!-- Camera crosshairs -->
        <path d="M 340 260 L 340 290 M 340 380 L 340 350 M 280 320 L 310 320 M 400 320 L 370 320" fill="none" class="ball-stroke" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Centered information block (Text) -->
    <g transform="translate(600, 360)">
        <!-- Project Title -->
        <text x="0" y="30" font-family="'SF Pro Display', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="28" font-weight="900" letter-spacing="1.2" class="text-title" text-anchor="middle">NAO BALL PICKUP</text>
        
        <!-- Center-aligned Divider line -->
        <line x1="-200" y1="65" x2="200" y2="65" class="divider" stroke-width="3" stroke-linecap="round"/>
        
        <!-- Tagline / Subtitle -->
        <text x="0" y="110" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" font-weight="500" class="text-subtitle" letter-spacing="0.5" text-anchor="middle">HSV Segmentation &amp; Keyframe Pickup for Humanoid Robotics</text>

        <!-- Technical Domain Badge -->
        <g transform="translate(-187.5, 155)">
            <rect x="0" y="0" width="180" height="36" rx="8" class="badge-rect-dev" stroke-width="1.5"/>
            <text x="90" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" class="text-badge-dev" text-anchor="middle" letter-spacing="1">ACADEMIC ARCHIVE</text>
        </g>

        <!-- GitHub Handle Badge -->
        <g transform="translate(7.5, 155)">
            <rect x="0" y="0" width="180" height="36" rx="8" fill="none" class="badge-rect-gh" stroke-width="1.5"/>
            <text x="90" y="22" font-family="'SF Pro Text', -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif" font-size="12" font-weight="700" class="text-badge-gh" text-anchor="middle" letter-spacing="1">@mtorun0x7cd</text>
        </g>
    </g>
</svg>